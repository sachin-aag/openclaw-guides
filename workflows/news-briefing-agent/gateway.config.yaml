# Gateway config for the News Briefing Agent
# See https://docs.openclaw.ai for the full reference.

timezone: ${GATEWAY_TZ:-Europe/Berlin}

agents:
  default:
    provider: ${OPENCLAW_PROVIDER}
    model: ${OPENCLAW_MODEL}
    workspace: ${WORKSPACE_DIR:-./workspace}
    memory:
      soul: SOUL.md
      user: USER.md
      memory: MEMORY.md

channels:
  - type: web
    host: ${OPENCLAW_HOST:-127.0.0.1}
    port: ${OPENCLAW_PORT:-3000}

  # Uncomment to enable Telegram notifications.
  # - type: telegram
  #   token: ${TELEGRAM_BOT_TOKEN}
  #   allowed_user_ids: ${TELEGRAM_ALLOWED_USER_IDS}

skills:
  - name: news-briefing
    file: ./skills/news-briefing.ts
    args:
      feeds_file: ${FEEDS_FILE:-workspace/feeds.txt}
      output_dir: ${BRIEFING_OUTPUT_DIR:-workspace/briefings}
      notify: web

# Uncomment when deploying to a VPS to run automatically every morning.
# cron:
#   - name: morning-briefing
#     schedule: "30 7 * * *"
#     skill: news-briefing
