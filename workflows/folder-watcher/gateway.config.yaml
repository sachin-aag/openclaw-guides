# Gateway config for the Folder Watcher
timezone: ${GATEWAY_TZ:-Europe/Berlin}

agents:
  default:
    provider: ${OPENCLAW_PROVIDER}
    model: ${OPENCLAW_MODEL}
    workspace: ${WORKSPACE_DIR:-./workspace}

channels:
  - type: web
    host: ${OPENCLAW_HOST:-127.0.0.1}
    port: ${OPENCLAW_PORT:-3000}

skills:
  - name: folder-watcher
    file: ./skills/folder-watcher.ts
    args:
      inbox: ${WATCH_INBOX:-workspace/inbox}
      out: ${WATCH_OUTPUT:-workspace/summaries}
      archive: ${WATCH_ARCHIVE:-workspace/inbox/processed}

heartbeat:
  interval_minutes: ${WATCH_INTERVAL_MIN:-1}
  skill: folder-watcher
